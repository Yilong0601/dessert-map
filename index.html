<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>甜點地圖 🍰</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --rose:#e8a5a5;--rose-deep:#c97c7c;--rose-light:#fdf0f0;
  --cream:#fdf6ee;--cream-dark:#f0e0cc;
  --brown:#6b3f2a;--brown-light:#9c6b50;
  --gold:#c9a96e;--gold-light:#f5e6c8;
  --sage:#8aab8a;
  --text:#3a2a20;--text-light:#7a6055;--text-muted:#a89080;
  --white:#fffdf9;--border:#e8d8c8;
  --shadow:rgba(107,63,42,0.12);
  --tab-h:68px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{height:100dvh;overflow:hidden;background:var(--cream);}
body{font-family:'Noto Sans TC',sans-serif;color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;height:100dvh;}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--cream);transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s;will-change:transform;overflow:hidden;}
.screen.hidden{transform:translateY(24px);opacity:0;pointer-events:none;}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px 12px;padding-top:calc(14px + var(--safe-t));flex-shrink:0;z-index:10;}
.topbar-row{display:flex;align-items:center;gap:10px;}
.topbar-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--brown);flex:1;line-height:1;}
.topbar-title em{font-style:italic;color:var(--rose-deep);}
.icon-btn{width:38px;height:38px;border-radius:12px;border:none;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--brown);transition:background .15s;flex-shrink:0;}
.icon-btn:active{background:var(--cream-dark);}

/* SEARCH */
.search-wrap{margin:12px 16px 6px;position:relative;flex-shrink:0;}
.search-input{width:100%;padding:12px 40px 12px 42px;border-radius:16px;border:1.5px solid var(--border);background:var(--white);font-family:'Noto Sans TC',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
.search-input:focus{border-color:var(--rose-deep);box-shadow:0 0 0 3px rgba(201,124,124,0.12);}
.s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--cream-dark);border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;color:var(--text-light);font-weight:700;}
.s-clear.show{display:flex;}
.search-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:80;background:var(--white);border-radius:16px;box-shadow:0 8px 32px var(--shadow);max-height:52vh;overflow-y:auto;display:none;border:1px solid var(--border);}
.search-drop.show{display:block;}
.sri{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.sri-em{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--gold-light),var(--rose-light));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0; background-size: cover; background-position: center;}
.sri-info{flex:1;min-width:0;}
.sri-name{font-size:14px;font-weight:700;color:var(--brown);margin-bottom:2px;}
.sri-addr{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sri-tag{font-size:10px;padding:3px 8px;border-radius:8px;background:var(--gold-light);color:var(--brown-light);font-weight:600;flex-shrink:0;}

/* CHIPS & SCROLL */
.chip-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:4px 16px 12px;flex-shrink:0;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--text-light);font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;}
.chip.on{background:var(--brown);border-color:var(--brown);color:var(--white);}
.scroll-content{flex:1;min-height:0;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 20px);}
.scroll-content::-webkit-scrollbar{display:none;}
.section-label{font-size:11px;letter-spacing:1.5px;color:var(--text-muted);padding:14px 16px 8px;text-transform:uppercase;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.section-label span{font-size:12px;color:var(--brown-light);letter-spacing:0;text-transform:none;font-weight:400;}

/* CARD (支援背景圖片) */
.shop-card{margin:0 16px 10px;background:var(--white);border-radius:18px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);display:flex;cursor:pointer;position:relative;border:1px solid rgba(232,216,200,0.5);}
.card-left{width:88px;min-width:88px;background:linear-gradient(135deg,var(--gold-light),var(--rose-light));display:flex;align-items:center;justify-content:center;font-size:36px;position:relative; background-size: cover; background-position: center;}
.user-badge{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:var(--sage);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;z-index:2;}
.card-body{flex:1;padding:12px 42px 12px 14px;min-width:0;}
.card-name{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:var(--brown);line-height:1.25;margin-bottom:3px;}
.card-tag{display:inline-block;font-size:10px;padding:3px 8px;border-radius:8px;background:var(--gold-light);color:var(--brown-light);font-weight:600;margin-bottom:5px;}
.card-desc{font-size:12px;color:var(--text-light);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px;}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.meta-pill{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:3px;}
.price-tag{font-size:11px;color:var(--rose-deep);font-weight:700;background:var(--rose-light);padding:3px 8px;border-radius:8px;}
.card-fav{position:absolute;top:10px;right:10px;font-size:20px;background:none;border:none;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}

.empty{text-align:center;padding:60px 24px;color:var(--text-muted);}
.empty .ei{font-size:52px;display:block;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.8;}

/* FAB & TABBAR */
.fab{position:fixed;right:20px;bottom:calc(var(--tab-h) + var(--safe-b) + 16px);width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--rose-deep),var(--brown));border:none;box-shadow:0 4px 20px rgba(107,63,42,0.35);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;color:white;}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,253,249,0.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);z-index:100;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;padding:8px 0;}
.tab-icon{font-size:22px;line-height:1;}
.tab-label{font-size:10px;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif;font-weight:500;}
.tab-dot{width:4px;height:4px;border-radius:50%;background:var(--rose-deep);margin-top:1px;opacity:0;}
.tab-item.on .tab-icon{transform:scale(1.1);}
.tab-item.on .tab-label{color:var(--rose-deep);font-weight:700;}
.tab-item.on .tab-dot{opacity:1;}

/* MAP SCREEN */
#mapScreen{background:var(--cream-dark);}
.map-container{flex:1;position:relative;}
#mainMap{width:100%;height:100%;z-index:1;} 
.leaflet-control-attribution{font-size:9px !important; opacity:0.6;}
.map-strip{position:absolute;bottom:0;left:0;right:0;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding:14px 16px calc(var(--tab-h) + var(--safe-b) + 14px); z-index:2; pointer-events:none;} 
.map-strip::-webkit-scrollbar{display:none;}
.map-mini{pointer-events:auto; flex-shrink:0; width:190px; background:var(--white); border-radius:16px; box-shadow:0 4px 20px rgba(107,63,42,0.18); padding:12px; cursor:pointer;}
.mm-em{font-size:22px;margin-bottom:5px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; background-size: cover; background-position: center; border-radius:6px;}
.mm-name{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:var(--brown);margin-bottom:3px;}
.mm-addr{font-size:11px;color:var(--text-muted);margin-bottom:8px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.mm-btn{width:100%;padding:8px;border-radius:10px;border:none;background:var(--brown);color:var(--white);font-family:'Noto Sans TC',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}

/* SHEET (支援大圖背景) */
.sheet-ov{position:fixed;inset:0;z-index:200;background:rgba(58,42,32,0);transition:background .3s;pointer-events:none;}
.sheet-ov.open{background:rgba(58,42,32,0.55);pointer-events:all;}
.sheet{position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--white);border-radius:24px 24px 0 0;padding-bottom:calc(var(--safe-b) + 20px);max-height:92vh;overflow-y:auto;transition:transform .34s cubic-bezier(.4,0,.2,1);}
.sheet.open{transform:translateX(-50%) translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--cream-dark);border-radius:2px;margin:14px auto 0;}
.sheet-hero{height:176px;display:flex;align-items:center;justify-content:center;font-size:70px;background:linear-gradient(135deg,var(--gold-light),var(--rose-light));margin:12px 16px 0;border-radius:18px;position:relative; background-size: cover; background-position: center;}
.sh-fav{position:absolute;top:10px;right:10px;border:none;background:rgba(255,253,249,0.88);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;}
.sh-body{padding:16px 20px 8px;}
.sh-name{font-family:'Playfair Display',serif;font-size:22px;color:var(--brown);line-height:1.2;margin-bottom:4px;}
.sh-tag{display:inline-block;font-size:11px;padding:4px 10px;border-radius:10px;background:var(--gold-light);color:var(--brown-light);font-weight:600;margin-bottom:8px;}
.sh-stars{color:var(--gold);font-size:14px;letter-spacing:2px;margin-bottom:12px;}
.info-row{display:flex;gap:10px;margin-bottom:14px;}
.info-pill{flex:1;background:var(--cream);border-radius:12px;padding:10px 12px;text-align:center;}
.ip-lbl{font-size:10px;color:var(--text-muted);margin-bottom:3px;}
.ip-val{font-size:12px;font-weight:700;color:var(--brown);}
.ip-val.price{color:var(--rose-deep);font-size:13px;}
.sh-desc{font-size:14px;color:var(--text);line-height:1.8;background:var(--cream);padding:13px 15px;border-radius:14px;border-left:3px solid var(--rose);margin-bottom:14px;}
.chip-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.chip-sm{font-size:11px;padding:5px 11px;border-radius:10px;border:1px solid var(--border);color:var(--text-light);}
.sh-addr{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text-light);background:var(--cream);padding:11px 14px;border-radius:12px;margin-bottom:16px;}
.action-row{display:flex;gap:10px;}
.btn-prim{flex:1;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--rose-deep),var(--brown));color:var(--white);font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;}
.btn-out{padding:15px 14px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--text-light);font-size:14px;cursor:pointer;display:flex;align-items:center;gap:5px;text-decoration:none;}
.btn-del{width:100%;padding:12px;border-radius:12px;border:1px solid var(--rose);background:transparent;color:var(--rose-deep);font-size:13px;cursor:pointer;margin-top:10px;}

/* ADD FORM & UPLOAD UI */
.form-ov{position:fixed;inset:0;z-index:300;background:rgba(58,42,32,0.6);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.form-ov.open{opacity:1;pointer-events:all;}
.form-box{width:100%;max-width:480px;background:var(--white);border-radius:24px 24px 0 0;padding-bottom:calc(var(--safe-b) + 20px);max-height:90vh;overflow-y:auto;transform:translateY(60px);transition:transform .34s cubic-bezier(.4,0,.2,1);}
.form-ov.open .form-box{transform:translateY(0);}
.form-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 6px;}
.form-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--brown);}
.form-close{background:var(--cream-dark);border:none;border-radius:50%;width:32px;height:32px;font-size:15px;cursor:pointer;}
.form-sub{font-size:12px;color:var(--text-muted);padding:0 20px 14px;border-bottom:1px solid var(--border);}
.form-body{padding:16px 20px;}
.fl{font-size:12px;color:var(--text-light);margin-bottom:6px;display:block;font-weight:600;}
.fi{width:100%;padding:12px 14px;border-radius:13px;border:1.5px solid var(--border);background:var(--cream);font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--text);outline:none;-webkit-appearance:none;}
.fi:focus{border-color:var(--rose-deep);box-shadow:0 0 0 3px rgba(201,124,124,0.12);background:var(--white);}
textarea.fi{resize:vertical;min-height:80px;line-height:1.6;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{margin-bottom:16px;}
.star-row{display:flex;gap:8px;margin-top:6px;}
.star-btn{font-size:26px;cursor:pointer;opacity:.25;transition:opacity .15s;background:none;border:none;}
.star-btn.on{opacity:1;}
.em-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:6px;}
.em-opt{aspect-ratio:1;border-radius:10px;border:1.5px solid var(--border);background:var(--cream);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.em-opt.sel{border-color:var(--rose-deep);background:var(--rose-light);}
.form-submit{margin:4px 20px 0;padding:15px;border-radius:14px;border:none;width:calc(100% - 40px);background:linear-gradient(135deg,var(--rose-deep),var(--brown));color:var(--white);font-size:15px;font-weight:700;cursor:pointer;}
.form-submit:disabled{opacity:0.5;cursor:not-allowed;}

/* 圖片上傳區塊 */
.file-wrap { width: 100%; height: 120px; border: 2px dashed var(--border); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); font-size: 13px; cursor: pointer; overflow: hidden; position: relative; background: var(--cream); }
#img-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
.custom-marker { background: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 6px rgba(0,0,0,0.25); border: 2px solid var(--rose-deep); font-size: 22px; cursor: pointer; transition: transform 0.2s; background-size: cover; background-position: center; }

/* TOAST */
.toast{position:fixed;top:calc(var(--safe-t) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);background:var(--brown);color:var(--white);padding:10px 22px;border-radius:30px;font-size:13px;font-weight:500;white-space:nowrap;z-index:999;transition:transform .34s cubic-bezier(.4,0,.2,1),opacity .34s;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="screen" id="homeScreen">
  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-title">甜點<em>地圖</em></div>
      <button class="icon-btn" onclick="openForm()">＋</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input class="search-input" id="searchInput" type="search" placeholder="搜尋店名、地址、甜點類型…" autocomplete="off" oninput="onSearch(this)" onfocus="onFocus()" onblur="onBlur()">
    <button class="s-clear" id="sClear" onclick="clearSearch()">✕</button>
    <div class="search-drop" id="searchDrop"></div>
  </div>
  <div class="chip-row" id="chipRow"></div>
  <div class="scroll-content" id="homeList"></div>
  <button class="fab" onclick="openForm()">＋</button>
</div>

<div class="screen hidden" id="favScreen">
  <div class="topbar"><div class="topbar-row"><div class="topbar-title">我的<em>收藏</em></div></div></div>
  <div class="scroll-content" id="favList"></div>
</div>

<div class="screen hidden" id="mapScreen">
  <div class="map-container"><div id="mainMap"></div> <div class="map-strip" id="mapStrip"></div></div>
</div>

<div class="sheet-ov" id="sheetOv" onclick="sheetOvClick(event)"><div class="sheet" id="sheet"><div class="sheet-handle"></div><div id="sheetBody"></div></div></div>

<div class="form-ov" id="formOv" onclick="formOvClick(event)">
  <div class="form-box">
    <div class="form-hd">
      <div class="form-title">新增甜點店 🍰</div>
      <button class="form-close" onclick="closeForm()">✕</button>
    </div>
    <div class="form-sub">把你發現的甜點秘境加進地圖！</div>
    <div class="form-body">
      <div class="fg">
        <label class="fl">📸 店家照片 (選填，自動取代 Emoji)</label>
        <div class="file-wrap" onclick="document.getElementById('f-img').click()">
          <span id="file-label">點擊從相簿選擇圖片</span>
          <img id="img-preview">
          <input type="file" id="f-img" hidden accept="image/*" onchange="previewImage(this)">
        </div>
      </div>
      <div class="fg"><label class="fl">店名 *</label><input class="fi" id="f-name" placeholder="例：某某甜點工作室"></div>
      <div class="fg"><label class="fl">甜點類型 *</label>
        <select class="fi" id="f-tag">
          <option>千層蛋糕</option><option>水果塔</option><option>抹茶</option><option>泡芙</option>
          <option>生乳蛋糕</option><option>布丁</option><option>創意甜點</option><option>日式甜點</option><option>法式甜點</option><option>伴手禮</option><option>其他</option>
        </select>
      </div>
      <div class="fg"><label class="fl">店家介紹</label><textarea class="fi" id="f-desc" placeholder="口味、環境、招牌品項…說說你的感受"></textarea></div>
      <div class="form-row">
        <div class="fg"><label class="fl">平均消費</label><input class="fi" id="f-price" placeholder="例：$150–$300"></div>
        <div class="fg"><label class="fl">營業時間</label><input class="fi" id="f-hours" placeholder="11:00–20:00"></div>
      </div>
      <div class="fg"><label class="fl">地址 * (會自動定位)</label><input class="fi" id="f-addr" placeholder="台中市…"></div>
      <div class="fg"><label class="fl">評分</label>
        <div class="star-row" id="starRow">
          <button class="star-btn on" data-v="1" onclick="setStar(1)">★</button>
          <button class="star-btn on" data-v="2" onclick="setStar(2)">★</button>
          <button class="star-btn on" data-v="3" onclick="setStar(3)">★</button>
          <button class="star-btn" data-v="4" onclick="setStar(4)">★</button>
          <button class="star-btn" data-v="5" onclick="setStar(5)">★</button>
        </div>
      </div>
      <div class="fg"><label class="fl">選個表情符號</label><div class="em-grid" id="emGrid"></div></div>
    </div>
    <button class="form-submit" id="submitBtn" onclick="submitShop()">✦ 新增並上傳</button>
  </div>
</div>

<nav class="tabbar">

// ═══════════════════ STATE & LEAFLET MAP ═══════════════════
let shops=[];
let favs=new Set();
let activeTab='home';
let activeFilter='all';
let fStars=3;
let fEmoji='🍰';
let sTimer;
let map;
let mapMarkers = [];

async function load(){
  try{
    let { data, error } = await db.from('shops').select('*');
    if(error) throw error;
    
    const customShops = (data || []).map(s => ({...s, tags:[s.tag], builtin: false})).reverse();
    shops = [...customShops, ...BUILTIN];

    const f = localStorage.getItem('ds_favs');
    favs = f ? new Set(JSON.parse(f)) : new Set();
  }catch(e){
    console.error('資料讀取失敗:', e);
    shops = [...BUILTIN];
    favs = new Set();
  }
  renderHome();
  if(map) updateMapMarkers();
}

function saveFavs(){localStorage.setItem('ds_favs',JSON.stringify([...favs]));}

function initMap() {
  if(map) return;
  map = L.map('mainMap', { zoomControl: false }).setView([24.151, 120.664], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
  updateMapMarkers();
}

function updateMapMarkers() {
  if(!map) return;
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];

  shops.forEach(s => {
    if(!s.lat || !s.lng) return;
    const bgStyle = s.image ? `background-image: url('${s.image}'); background-color: #eee;` : '';
    const content = s.image ? '' : (s.emoji || '🍰');
    
    const icon = L.divIcon({
      className: 'custom-leaflet-icon',
      html: `<div class="custom-marker" style="${bgStyle}">${content}</div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 36]
    });
    const marker = L.marker([s.lat, s.lng], {icon: icon}).addTo(map);
    marker.on('click', () => openSheet(s.id));
    mapMarkers.push(marker);
  });
}

function panMapTo(id) {
  const s = shops.find(x => String(x.id) === String(id));
  if(s && s.lat && s.lng && map) {
    map.flyTo([s.lat, s.lng], 16, { duration: 0.8 });
  }
}

// ═══════════════════ TABS ═══════════════════
function switchTab(t){
  activeTab=t;
  ['home','fav','map'].forEach(x=>{
    document.getElementById(x+'Screen').classList.toggle('hidden',x!==t);
    document.getElementById('tab-'+x).classList.toggle('on',x===t);
  });
  document.querySelector('.fab').style.display=t==='home'?'flex':'none';
  if(t==='fav') renderFavs();
  
  if(t==='map'){
    renderMapStrip();
    if(!map) initMap();
    setTimeout(() => map.invalidateSize(), 300);
  }
}

// ═══════════════════ FILTER / RENDER ═══════════════════
function buildChips(){
  const row=document.getElementById('chipRow');
  row.innerHTML=['全部',...ALL_TAGS].map(t=>{
    const val=t==='全部'?'all':t;
    return `<button class="chip${val===activeFilter?' on':''}" onclick="setFilter('${val}',this)">${t}</button>`;
  }).join('');
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderHome();
}

function getFiltered(q=''){
  let list=shops;
  if(activeFilter!=='all') list=list.filter(s=>s.tag===activeFilter||(s.tags&&s.tags.includes(activeFilter)));
  if(q){const lq=q.toLowerCase();list=list.filter(s=>s.name.toLowerCase().includes(lq)||s.address.toLowerCase().includes(lq)||s.tag.toLowerCase().includes(lq)||(s.tags&&s.tags.some(t=>t.toLowerCase().includes(lq)))||(s.desc&&s.desc.toLowerCase().includes(lq)));}
  return list;
}

function cardHTML(s){
  const fav=favs.has(s.id);
  const bgStyle = s.image ? `background-image: url('${s.image}'); background-color: #eee;` : `background: linear-gradient(135deg, var(--gold-light), var(--rose-light));`;
  const content = s.image ? '' : (s.emoji || '🍰');

  return `<div class="shop-card" id="sc-${s.id}" onclick="openSheet('${s.id}')">
    <div class="card-left" style="${bgStyle}">
      ${content}
      ${!s.builtin?'<div class="user-badge">大家新增</div>':''}
    </div>
    <div class="card-body">
      <div class="card-name">${s.name}</div>
      <div class="card-tag">${s.tag}</div>
      <div class="card-desc">${s.desc||'尚無介紹'}</div>
      <div class="card-meta">
        <span class="meta-pill">📍 ${(s.address||'').substring(0,14)}</span>
        <span class="price-tag">💰 ${s.price||'–'}</span>
      </div>
    </div>
    <button class="card-fav" onclick="toggleFav(event,'${s.id}')">${fav?'❤️':'🤍'}</button>
  </div>`;
}

function renderHome(q=''){
  const list=getFiltered(q);
  const el=document.getElementById('homeList');
  if(!list.length){el.innerHTML=`<div class="empty"><span class="ei">🍽️</span><p>找不到符合的甜點店<br><small>試試其他關鍵字，或點 ＋ 新增！</small></p></div>`;return;}
  const user=list.filter(s=>!s.builtin);
  const bi=list.filter(s=>s.builtin);
  let html='';
  if(user.length){html+=`<div class="section-label">地圖探索的新店家 <span>${user.length} 間</span></div>`+user.map(cardHTML).join('');}
  html+=`<div class="section-label">精選甜點店 <span>${bi.length} 間</span></div>`+bi.map(cardHTML).join('');
  el.innerHTML=html;
}

function renderFavs(){
  const list=shops.filter(s=>favs.has(s.id));
  const el=document.getElementById('favList');
  el.innerHTML=!list.length
    ?`<div class="empty"><span class="ei">🤍</span><p>還沒有收藏的店家<br><small>在探索頁點 🤍 加入收藏！</small></p></div>`
    :`<div class="section-label">已收藏 <span>${list.length} 間</span></div>`+list.map(cardHTML).join('');
}

function renderMapStrip(){
  document.getElementById('mapStrip').innerHTML=shops.map(s=>{
    const bgStyle = s.image ? `background-image: url('${s.image}'); background-color: #eee;` : `background: linear-gradient(135deg, var(--gold-light), var(--rose-light));`;
    const content = s.image ? '' : (s.emoji || '🍰');
    return `
    <div class="map-mini" onclick="panMapTo('${s.id}'); openSheet('${s.id}');">
      <div class="mm-em" style="${bgStyle}">${content}</div>
      <div class="mm-name">${s.name}</div>
      <div class="mm-addr">${s.address||''}</div>
      <div class="mm-btn" style="pointer-events:none">在地圖上查看 📍</div>
    </div>`;
  }).join('');
}

// ═══════════════════ FAVORITES ═══════════════════
function toggleFav(e,id){
  e.stopPropagation();
  const idStr = String(id);
  const realId = shops.find(s => String(s.id) === idStr)?.id;
  if(!realId) return;

  favs.has(realId)?(favs.delete(realId),toast('已移除收藏 🤍')):(favs.add(realId),toast('已加入收藏 ❤️'));
  saveFavs();
  const btn=document.querySelector(`#sc-${idStr} .card-fav`);
  if(btn)btn.textContent=favs.has(realId)?'❤️':'🤍';
  const sh=document.getElementById('shFav');
  if(sh&&String(sh.dataset.id)===idStr)sh.textContent=favs.has(realId)?'❤️':'🤍';
}

// ═══════════════════ DETAIL SHEET ═══════════════════
function openSheet(id){
  const s=shops.find(x=>String(x.id)===String(id));if(!s)return;
  const isFav=favs.has(s.id);
  const stars='★'.repeat(s.stars||3)+'☆'.repeat(5-(s.stars||3));
  
  const bgStyle = s.image ? `background-image: url('${s.image}'); background-color: #eee;` : `background: linear-gradient(135deg, var(--gold-light), var(--rose-light));`;
  const content = s.image ? '' : (s.emoji || '🍰');

  document.getElementById('sheetBody').innerHTML=`
    <div class="sheet-hero" style="${bgStyle}">
      ${content}
      <button id="shFav" data-id="${s.id}" class="sh-fav" onclick="toggleFav(event,'${s.id}')">${isFav?'❤️':'🤍'}</button>
    </div>
    <div class="sh-body">
      <div class="sh-name">${s.name}</div>
      <div class="sh-tag">${s.tag}</div>
      <div class="sh-stars">${stars}</div>
      <div class="info-row">
        <div class="info-pill"><div class="ip-lbl">💰 平均消費</div><div class="ip-val price">${s.price||'–'}</div></div>
        <div class="info-pill"><div class="ip-lbl">🕐 營業時間</div><div class="ip-val" style="font-size:11px;">${s.hours||'–'}</div></div>
      </div>
      <div class="sh-desc">${s.desc||'尚無介紹'}</div>
      ${s.tags&&s.tags.length?`<div class="chip-list">${s.tags.map(t=>`<span class="chip-sm">${t}</span>`).join('')}</div>`:''}
      <div class="sh-addr">📍 <span>${s.address||'–'}</span></div>
      <div class="action-row">
        <a class="btn-prim" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent((s.address||s.name)+' 台中')}" target="_blank">🗺️ Google Maps 導航</a>
        <a class="btn-out" href="https://maps.apple.com/?q=${encodeURIComponent(s.name)}" target="_blank">🍎</a>
      </div>
      ${!s.builtin?`<button class="btn-del" onclick="deleteShop('${s.id}')">🗑 刪除這間店家</button>`:''}
    </div>`;
  document.getElementById('sheetOv').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function closeSheet(){
  document.getElementById('sheetOv').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
function sheetOvClick(e){if(e.target===document.getElementById('sheetOv'))closeSheet();}

async function deleteShop(id){
  if(!confirm('確定要刪除這間店家嗎？'))return;
  try {
    const { error } = await db.from('shops').delete().eq('id', id);
    if(error) throw error;
    
    favs.delete(id);
    saveFavs();
    closeSheet();
    toast('已刪除 🗑');
    await load();
  } catch (e) {
    console.error('刪除失敗', e);
    toast('刪除失敗 😢');
  }
}

// ═══════════════════ SEARCH ═══════════════════
function onSearch(inp){
  const q=inp.value.trim();
  document.getElementById('sClear').classList.toggle('show',q.length>0);
  clearTimeout(sTimer);
  sTimer=setTimeout(()=>q?showDrop(q):(hideDrop(),renderHome()),180);
}
function showDrop(q){
  const res=getFiltered(q).slice(0,8);
  const el=document.getElementById('searchDrop');
  
  el.innerHTML=!res.length
    ?`<div style="padding:18px;text-align:center;color:var(--text-muted);font-size:13px;">🔍 找不到「${q}」相關店家</div>`
    :res.map(s=>{
        const bgStyle = s.image ? `background-image: url('${s.image}'); background-color: #eee;` : `background: linear-gradient(135deg, var(--gold-light), var(--rose-light));`;
        const content = s.image ? '' : (s.emoji || '🍰');
        return `
      <div class="sri" onclick="openSheet('${s.id}');hideDrop();">
        <div class="sri-em" style="${bgStyle}">${content}</div>
        <div class="sri-info">
          <div class="sri-name">${hl(s.name,q)}</div>
          <div class="sri-addr">${s.address||''}</div>
        </div>
        <span class="sri-tag">${s.tag}</span>
      </div>`
    }).join('');
  el.classList.add('show');
}
function hl(t,q){return t.replace(new RegExp(q,'gi'),m=>`<mark style="background:var(--gold-light);color:var(--brown);border-radius:3px;">${m}</mark>`);}
function hideDrop(){document.getElementById('searchDrop').classList.remove('show');}
function onFocus(){if(document.getElementById('searchInput').value)document.getElementById('searchDrop').classList.add('show');}
function onBlur(){setTimeout(hideDrop,200);}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('sClear').classList.remove('show');
  hideDrop();renderHome();
}

// ═══════════════════ ADD FORM & UPLOAD ═══════════════════
function openForm(){
  document.getElementById('formOv').classList.add('open');
  ['f-name','f-desc','f-price','f-hours','f-addr'].forEach(id=>document.getElementById(id).value='');
  setStar(3);selectEmoji('🍰');
  
  // 重置圖片預覽
  document.getElementById('f-img').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-preview').src = '';
  document.getElementById('file-label').style.display = 'block';
}
function closeForm(){document.getElementById('formOv').classList.remove('open');}
function formOvClick(e){if(e.target===document.getElementById('formOv'))closeForm();}

function setStar(n){
  fStars=n;
  document.querySelectorAll('.star-btn').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.v)<=n));
}
function selectEmoji(em){
  fEmoji=em;
  document.querySelectorAll('.em-opt').forEach(b=>b.classList.toggle('sel',b.dataset.e===em));
}
function buildEmGrid(){
  document.getElementById('emGrid').innerHTML=EMOJIS.map(e=>`<button class="em-opt${e===fEmoji?' sel':''}" data-e="${e}" onclick="selectEmoji('${e}')">${e}</button>`).join('');
}

// 預覽圖片
function previewImage(input) {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('img-preview').src = e.target.result;
      document.getElementById('img-preview').style.display = 'block';
      document.getElementById('file-label').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
}

// 自動將地址轉為經緯度
async function fetchCoordinates(address) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ' 台中')}`);
    const data = await res.json();
    if(data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch(e) {}
  return { lat: 24.1368 + (Math.random()-0.5)*0.02, lng: 120.685 + (Math.random()-0.5)*0.02 };
}

async function submitShop(){
  const name=document.getElementById('f-name').value.trim();
  const addr=document.getElementById('f-addr').value.trim();
  const file=document.getElementById('f-img').files[0];
  
  if(!name){toast('請填寫店名！');return;}
  if(!addr){toast('請填寫地址！');return;}
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '圖片上傳與定位中...';

  let imageUrl = null;
  // 1. 如果有選擇照片，上傳到 Supabase Storage
  if (file) {
    const fileName = `${Date.now()}_${file.name}`;
    const { data: uploadData, error: uploadError } = await db.storage.from('images').upload(fileName, file);
    
    if (!uploadError) {
      const { data: urlData } = db.storage.from('images').getPublicUrl(fileName);
      imageUrl = urlData.publicUrl;
    } else {
      console.error('圖片上傳失敗', uploadError);
      toast('圖片上傳失敗，僅儲存文字資訊');
    }
  }

  // 2. 取得經緯度
  const coords = await fetchCoordinates(addr);

  // 3. 準備寫入資料庫
  const newShop = {
    name: name,
    tag: document.getElementById('f-tag').value,
    desc: document.getElementById('f-desc').value.trim(),
    price: document.getElementById('f-price').value.trim() || '–',
    hours: document.getElementById('f-hours').value.trim() || '–',
    address: addr,
    emoji: fEmoji,
    stars: fStars,
    lat: coords.lat,
    lng: coords.lng,
    image: imageUrl  // 寫入圖片網址
  };

  try {
    const { error } = await db.from('shops').insert([newShop]);
    if (error) throw error;
    
    closeForm();
    toast('🎉 成功新增「'+name+'」！');
    await load();
  } catch (err) {
    console.error('新增失敗:', err);
    toast('新增失敗，請檢查網路或欄位格式！ 😢');
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ 新增並上傳';
  }
}

// ═══════════════════ TOAST & INIT ═══════════════════
let tTimer;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tTimer);tTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

async function init() {
  buildChips();
  buildEmGrid();
  await load();
}
init();
</script>
